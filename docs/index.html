<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>WEALTH MATRIX</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#05080f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WealthMatrix">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
/* ══════════════════════════════════════
   CONFIG: 在此填入您的 Supabase 設定
   ══════════════════════════════════════ */

:root {
  --bg:        #05080f;
  --panel:     #090f1a;
  --panel2:    #0b1422;
  --border:    #1a3a55;
  --cyan:      #00f5ff;
  --cyan-dim:  #00a8b0;
  --green:     #00ff88;
  --green-dim: #00aa55;
  --pink:      #ff2d78;
  --red:       #ff4444;
  --blue:      #1a6fff;
  --text:      #c8e0f0;
  --muted:     #7aaabb;
  --gold:      #ffd700;
  --orange:    #ff9500;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Rajdhani', 'Consolas', 'Courier New', monospace;
  font-size: 14px;
  min-height: 100dvh;
  overflow-x: hidden;
}

/* ── Login ── */
#login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: 24px;
}

.login-box {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 36px 28px;
  width: 100%;
  max-width: 380px;
}

.login-title {
  text-align: center;
  font-size: 22px;
  letter-spacing: 3px;
  color: var(--cyan);
  margin-bottom: 8px;
  text-shadow: 0 0 10px rgba(0,245,255,0.4);
}

.login-sub {
  text-align: center;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-bottom: 28px;
}

.field {
  margin-bottom: 14px;
}

.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 5px;
}

.field input, .field select {
  width: 100%;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 14px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.field input:focus, .field select:focus {
  border-color: var(--cyan-dim);
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  background: transparent;
  border: 1px solid var(--cyan-dim);
  border-radius: 4px;
  color: var(--cyan);
  cursor: pointer;
  font-family: inherit;
  font-size: 13px;
  letter-spacing: 1px;
  padding: 8px 16px;
  transition: background 0.15s, border-color 0.15s;
  white-space: nowrap;
}

.btn:hover  { background: rgba(0,245,255,0.08); }
.btn:active { background: rgba(0,245,255,0.15); }

.btn.full  { width: 100%; margin-top: 4px; }
.btn.green { border-color: var(--green-dim); color: var(--green); }
.btn.green:hover { background: rgba(0,255,136,0.08); }
.btn.red   { border-color: rgba(255,68,68,0.5); color: var(--red); }
.btn.red:hover   { background: rgba(255,68,68,0.08); }
.btn.orange { border-color: rgba(255,149,0,0.5); color: var(--orange); }
.btn.orange:hover { background: rgba(255,149,0,0.08); }
.btn.sm    { font-size: 11px; padding: 4px 10px; }
.btn.icon-btn { border: none; padding: 4px 6px; opacity: 0.6; }
.btn.icon-btn:hover { opacity: 1; background: rgba(255,255,255,0.05); }

#login-error {
  color: var(--red);
  font-size: 12px;
  text-align: center;
  margin-top: 10px;
  min-height: 18px;
}

/* ── App shell ── */
#app-screen { display: none; flex-direction: column; min-height: 100dvh; }

header {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 100;
}

.app-title {
  font-size: 16px;
  letter-spacing: 2px;
  color: var(--cyan);
  text-shadow: 0 0 8px rgba(0,245,255,0.3);
  flex: 1;
}

.sync-indicator {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 1px;
}

.sync-indicator.saving { color: var(--orange); }
.sync-indicator.saved  { color: var(--green-dim); }
.sync-indicator.error  { color: var(--red); }

/* ── Tabs ── */
.tab-bar {
  display: flex;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 49px;
  z-index: 99;
}

.tab-btn {
  flex: 1;
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  letter-spacing: 2px;
  padding: 10px 8px;
  transition: color 0.15s, border-color 0.15s;
}

.tab-btn.active {
  color: var(--cyan);
  border-bottom-color: var(--cyan);
}

.tab-content { display: none; padding: 14px; flex: 1; }
.tab-content.active { display: block; }

/* ── Sections ── */
.section {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 12px;
  overflow: hidden;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--muted);
}

.section-body { padding: 10px 12px; }

/* ── Total card ── */
.total-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 18px 16px;
  margin-bottom: 12px;
  text-align: center;
}

.total-label { font-size: 11px; letter-spacing: 2px; color: var(--muted); margin-bottom: 6px; }

.total-amount {
  font-size: 32px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 1px;
  text-shadow: 0 0 12px rgba(0,245,255,0.3);
}

/* ── Row item ── */
.item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(26,58,85,0.4);
}

.item-row:last-child { border-bottom: none; }

.item-name { flex: 1; font-size: 13px; }
.item-val  { font-size: 13px; color: var(--cyan-dim); text-align: right; min-width: 90px; }

/* ── Goal bar ── */
.goal-row { padding: 8px 0; border-bottom: 1px solid rgba(26,58,85,0.4); }
.goal-row:last-child { border-bottom: none; }
.goal-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
.goal-name { font-size: 13px; }
.goal-pct  { font-size: 12px; color: var(--muted); }
.goal-bar-bg { height: 4px; background: var(--panel2); border-radius: 2px; overflow: hidden; }
.goal-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }

/* ── Cashflow ── */
.cf-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.cf-selector select {
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  padding: 6px 10px;
  outline: none;
}

.cf-summary {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}

.cf-stat {
  flex: 1;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px;
  text-align: center;
}

.cf-stat-label { font-size: 10px; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 4px; }
.cf-stat-val   { font-size: 15px; font-weight: 600; }

.cf-record {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid rgba(26,58,85,0.4);
}

.cf-record:last-child { border-bottom: none; }
.cf-date     { font-size: 11px; color: var(--muted); min-width: 54px; }
.cf-cat      { flex: 1; font-size: 12px; }
.cf-note     { font-size: 11px; color: var(--muted); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cf-amount   { font-size: 13px; min-width: 75px; text-align: right; }
.income      { color: var(--green); }
.expense     { color: var(--red); }

/* ── Modal overlay ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.overlay.open { display: flex; }

.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px 10px 0 0;
  padding: 20px 18px 32px;
  width: 100%;
  max-width: 480px;
  max-height: 85dvh;
  overflow-y: auto;
}

.modal-title {
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--cyan);
  margin-bottom: 18px;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.modal-actions .btn { flex: 1; }

/* ── Misc ── */
.empty-hint { color: var(--muted); font-size: 12px; text-align: center; padding: 12px 0; }

.cash-val {
  font-size: 22px;
  font-weight: 600;
  color: var(--cyan-dim);
  text-align: center;
  padding: 10px 0 4px;
}

.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 8px 0;
}

/* ── Spinner ── */
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--cyan);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
}

@keyframes spin { to { transform: rotate(360deg); } }

@media (min-width: 600px) {
  .tab-content { max-width: 600px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════
     LOGIN SCREEN
     ════════════════════════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">⬡ WEALTH MATRIX</div>
    <div class="login-sub">SECURE ACCESS TERMINAL</div>

    <div class="field">
      <label>SUPABASE URL</label>
      <input type="url" id="cfg-url" placeholder="https://xxxx.supabase.co" autocomplete="off">
    </div>
    <div class="field">
      <label>ANON KEY</label>
      <input type="text" id="cfg-key" placeholder="eyJ..." autocomplete="off">

    <div class="field">
      <label>EMAIL</label>
      <input type="email" id="login-email" placeholder="user@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>PASSWORD</label>
      <input type="password" id="login-pass" autocomplete="current-password">

</div>

<!-- ════════════════════════════════
     APP SCREEN
     ════════════════════════════════ -->
<div id="app-screen">
  <header>
    <span class="app-title">⬡ WEALTH MATRIX</span>
    <span class="sync-indicator" id="sync-status"></span>
    <button class="btn sm" id="logout-btn">LOGOUT</button>
  </header>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">DASHBOARD</button>
    <button class="tab-btn" data-tab="cashflow">CASHFLOW</button>
  </div>

  <!-- ── DASHBOARD TAB ── -->
  <div class="tab-content active" id="tab-dashboard">

    <div class="total-card">
      <div class="total-label">TOTAL ASSETS (TWD)</div>
      <div class="total-amount" id="total-display">—</div>
    </div>

    <!-- Banks -->
    <div class="section">
      <div class="section-header">
        <span class="section-title">BANK ACCOUNTS</span>
        <button class="btn sm green" id="add-bank-btn">+ ADD</button>
      </div>
      <div class="section-body" id="banks-list"></div>
    </div>

    <!-- Cash -->
    <div class="section">
      <div class="section-header">

    <div class="section">

    <div class="section">

    <div class="section">

        <div style="position:relative;max-width:260px;margin:0 auto;">
          <canvas id="alloc-chart"></canvas>

</div><!-- /app-screen -->

<!-- ════════════════════════════════
     MODALS
     ════════════════════════════════ -->

</div>

<!-- Goal modal -->
<div class="overlay" id="goal-modal">
  <div class="modal">
    <div class="modal-title" id="goal-modal-title">ADD GOAL</div>

    <div class="field"><label>TARGET AMOUNT (TWD)</label><input type="number" id="gl-target" placeholder="0" min="0"></div>

      <label>TYPE</label>

      </select>

    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  CONFIG — filled by login form or localStorage
// ══════════════════════════════════════════════════════════
const LS_CFG_KEY  = 'wm_cfg';
const LS_SESS_KEY = 'wm_session';
const TABLE       = 'wealthmatrix';

let _sb = null;
let _data    = null;
let _userId  = null;
let _saveTimer = null;

// ── Toast notification ────────────────────────────────────
let _toastTimer = null;
function showToast(msg, isError = false) {
  let el = document.getElementById('_wm_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_wm_toast';
    el.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);' +
      'background:var(--panel);border-radius:6px;font-family:inherit;font-size:12px;' +
      'letter-spacing:1px;padding:10px 20px;z-index:9999;pointer-events:none;' +
      'transition:opacity 0.4s;white-space:nowrap;';
    document.body.appendChild(el);
  }
  const c = isError ? 'var(--red)' : 'var(--orange)';
  el.style.border  = '1px solid ' + c;
  el.style.color   = c;
  el.textContent   = msg;
  el.style.opacity = '1';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.style.opacity = '0'; }, 3000);
}

// ── Helpers ───────────────────────────────────────────────
const fmt = n => {
  const abs = Math.abs(n);
  if (abs >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
  if (abs >= 1e4) return (n / 1e4).toFixed(1) + ' 萬';
  return n.toLocaleString('zh-TW');
};

const fmtFull = n => n.toLocaleString('zh-TW', { minimumFractionDigits: 0 });

const today = () => new Date().toISOString().slice(0, 10);

// ── Default data structure ────────────────────────────────
function defaultData() {
  return {
    banks: [], cash: 0, stocks: [], goals: [],
    goals_visible: true,
    cashflow_monthly: {},
    cashflow: [],
    history: [],
    dca_reminder: { enabled: false, day: 5, last_reminded: '' },
    usd_rate: 31.5,
    usd_rate_date: '',
    window_geometry: null,
    undo_stack: [],
    _updated: '',
  };
}

// ── Supabase init ─────────────────────────────────────────
function initSupabase(url, anonKey) {
  _sb = window.supabase.createClient(url, anonKey);
}

// ── Sync status ───────────────────────────────────────────
function setSyncStatus(state, text) {
  const el = document.getElementById('sync-status');
  el.className = 'sync-indicator ' + state;
  el.textContent = text;
}

// ── Cloud load ────────────────────────────────────────────
async function cloudLoad() {
  if (!_sb || !_userId) return null;
  setSyncStatus('saving', '⟳ SYNCING');
  try {
    const { data, error } = await _sb
      .from(TABLE)
      .select('payload, updated')
      .eq('id', _userId)
      .limit(1);
    if (error) throw error;
    if (!data || data.length === 0) return null;
    return JSON.parse(data[0].payload);
  } catch (e) {
    setSyncStatus('error', '⚠ SYNC ERR');
    console.error('cloudLoad', e);
    return null;
  }
}

// ── Cloud save (debounced 1.5s) ───────────────────────────
function scheduleSave() {
  setSyncStatus('saving', '● PENDING');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(cloudSave, 1500);
}

async function cloudSave() {
  if (!_sb || !_userId || !_data) return;
  setSyncStatus('saving', '⟳ SAVING');
  _data._updated = new Date().toISOString();
  const payload = JSON.stringify(_data);
  try {
    const { error } = await _sb
      .from(TABLE)
      .upsert({ id: _userId, payload, updated: _data._updated },
               { onConflict: 'id' });
    if (error) throw error;
    setSyncStatus('saved', '✓ SAVED');
    setTimeout(() => setSyncStatus('', ''), 3000);
  } catch (e) {
    setSyncStatus('error', '⚠ SAVE ERR');
    showToast('同步失敗，請確認網路連線', true);
    console.error('cloudSave', e);
  }
}

function loadSavedCfg() {
  try {
    const c = JSON.parse(localStorage.getItem(LS_CFG_KEY) || '{}');
    if (c.url) document.getElementById('cfg-url').value = c.url;
    if (c.key) document.getElementById('cfg-key').value = c.key;
    if (c.email) document.getElementById('login-email').value = c.email;
  } catch {}
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const url   = document.getElementById('cfg-url').value.trim().replace(/\/$/, '');
  const key   = document.getElementById('cfg-key').value.trim();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');

  errEl.textContent = '';
  if (!url || !key || !email || !pass) {
    errEl.textContent = '請填寫所有欄位';
    return;
  }

  document.getElementById('login-btn').innerHTML =
    '<span class="spinner"></span> CONNECTING';
  document.getElementById('login-btn').disabled = true;

  try {
    initSupabase(url, key);
    const { data, error } = await _sb.auth.signInWithPassword({ email, password: pass });
    if (error) throw error;

    _userId = data.user.id;
    localStorage.setItem(LS_CFG_KEY, JSON.stringify({ url, key, email }));

    await enterApp();
  } catch (e) {
    errEl.textContent = e.message || '登入失敗';
    document.getElementById('login-btn').textContent = 'LOGIN';
    document.getElementById('login-btn').disabled = false;
  }
});

// Allow Enter key on login fields
['cfg-url','cfg-key','login-email','login-pass'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('login-btn').click();
  });
});

// Auto-login via saved session
async function tryAutoLogin() {
  loadSavedCfg();
  const cfg = JSON.parse(localStorage.getItem(LS_CFG_KEY) || '{}');
  if (!cfg.url || !cfg.key) return;
  initSupabase(cfg.url, cfg.key);
  const { data: { session } } = await _sb.auth.getSession();
  if (session) {
    _userId = session.user.id;
    await enterApp();
  }
}

async function enterApp() {
  const cloud = await cloudLoad();
  _data = cloud || defaultData();

  // Migrate legacy flat cashflow to monthly
  if (_data.cashflow && _data.cashflow.length && !Object.keys(_data.cashflow_monthly || {}).length) {
    _data.cashflow_monthly = {};
    for (const r of _data.cashflow) {
      const ym = r.date.slice(0, 7);
      (_data.cashflow_monthly[ym] = _data.cashflow_monthly[ym] || []).push(r);
    }
    _data.cashflow = [];
  }

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-screen').style.display   = 'flex';
  setSyncStatus('saved', '✓ LOADED');
  setTimeout(() => setSyncStatus('', ''), 2000);

  initCfSelectors();
  renderAll();
}

// ── Asset allocation pie chart ────────────────────────────────
let _allocChart = null;

function renderAllocChart() {
  const bank  = bankTotal();
  const cash  = _data.cash || 0;
  const stock = stockTotal();
  const total = bank + cash + stock;

  const canvas = document.getElementById('alloc-chart');
  if (!canvas) return;

  const labels = ['BANK', 'CASH', 'STOCKS'];
  const values = [bank, cash, stock];
  const colors = ['#00a8b0', '#ffd700', '#ff9500'];

  if (_allocChart) {
    _allocChart.data.datasets[0].data = values;
    _allocChart.update();
  } else {
    _allocChart = new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels,
        datasets: [{
          data: values,
          backgroundColor: colors,
          borderColor: '#090f1a',
          borderWidth: 3,
          hoverOffset: 6,
        }]
      },
      options: {
        cutout: '62%',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                const pct = total > 0 ? (ctx.raw / total * 100).toFixed(1) : 0;
                return ` NT$ ${fmtFull(ctx.raw)}  (${pct}%)`;
              }
            }
          }
        }
      }
    });
  }

  // Custom legend
  const leg = document.getElementById('alloc-legend');
  if (leg) {
    leg.innerHTML = labels.map((l, i) => {
      const pct = total > 0 ? (values[i] / total * 100).toFixed(1) : '0.0';
      return `<div style="display:flex;align-items:center;gap:5px;font-size:11px;">
        <span style="width:10px;height:10px;border-radius:2px;background:${colors[i]};display:inline-block;"></span>
        <span style="color:var(--muted)">${l}</span>
        <span style="color:${colors[i]}">${pct}%</span>
      </div>`;
    }).join('');
  }
}

function renderCash() {

}

function renderStocks() {
  const el = document.getElementById('stocks-list');
  const stocks = _data.stocks || [];
  if (!stocks.length) { el.innerHTML = '<div class="empty-hint">尚無持股</div>'; return; }
  el.innerHTML = stocks.map((s, i) => {
    const hasLive = s.last_price != null;
    const price   = hasLive ? s.last_price : (s.cost || 0);
    const val     = price * (s.shares || 0);
    const hcost   = s.holding_cost != null ? s.holding_cost : (s.cost || 0) * (s.shares || 0);
    const pnl     = hasLive && hcost > 0 ? val - hcost : null;
    const pnlHtml = pnl != null
      ? `<span style="font-size:11px;color:${pnl>=0?'var(--green)':'var(--red)'};">${pnl>=0?'+':''}NT$&nbsp;${fmt(Math.abs(pnl))}</span>`

      ? `<span style="font-size:10px;color:var(--muted);">@${s.last_price}&nbsp;${s.last_updated||''}</span>`
      : `<span style="font-size:10px;color:var(--muted);">成本計算</span>`;

// ══════════════════════════════════════════════════════════
function initCfSelectors() {
  const yearSel = document.getElementById('cf-year');
  const now = new Date();
  const curYear = now.getFullYear();
  // -2 to +1 range, plus any years with data
  const dataYears = new Set(
    Object.keys(_data.cashflow_monthly || {}).map(k => parseInt(k.slice(0, 4)))
  );
  const years = new Set([curYear - 2, curYear - 1, curYear, curYear + 1, ...dataYears]);
  const sorted = [...years].sort((a, b) => b - a);
  yearSel.innerHTML = sorted.map(y =>
    `<option value="${y}" ${y === curYear ? 'selected' : ''}>${y}</option>`
  ).join('');

  const month = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('cf-month').value = month;

  yearSel.addEventListener('change', renderCashflow);
  document.getElementById('cf-month').addEventListener('change', renderCashflow);
}

function getCfKey() {
  const y = document.getElementById('cf-year').value;
  const m = document.getElementById('cf-month').value;
  return `${y}-${m}`;
}

function renderCashflow() {
  const key = getCfKey();
  const records = (_data.cashflow_monthly || {})[key] || [];
  const sorted = [...records].sort((a, b) => b.date.localeCompare(a.date));

  let income = 0, expense = 0;
  for (const r of records) {
    const inc = r.type === '收入' || (r.type == null && r.amount >= 0);
    if (inc) income += Math.abs(r.amount);
    else     expense += Math.abs(r.amount);
  }
  const net = income - expense;

  document.getElementById('cf-income').textContent  = 'NT$ ' + fmt(income);
  document.getElementById('cf-expense').textContent = 'NT$ ' + fmt(expense);
  document.getElementById('cf-net').textContent     = 'NT$ ' + fmt(net);
  document.getElementById('cf-net').className       = 'cf-stat-val ' + (net >= 0 ? 'income' : 'expense');

  const el = document.getElementById('cf-records');
  if (!sorted.length) { el.innerHTML = '<div class="empty-hint">本月無記錄</div>'; return; }

  el.innerHTML = sorted.map((r, sortedIdx) => {
    const realIdx = records.indexOf(r);
    const inc = r.type === '收入' || (r.type == null && r.amount >= 0);
    return `
    <div class="cf-record">
      <span class="cf-date">${r.date.slice(5)}</span>
      <span class="cf-cat">${esc(r.category || '')}</span>
      <span class="cf-note" title="${esc(r.note || '')}">${esc(r.note || '')}</span>
      <span class="cf-amount ${inc ? 'income' : 'expense'}">
        ${inc ? '+' : '−'}NT$ ${fmt(Math.abs(r.amount))}
      </span>
      <button class="btn icon-btn sm" style="color:var(--cyan-dim)" onclick="openEditCfModal('${key}', ${realIdx})">✎</button>
      <button class="btn icon-btn sm red" onclick="deleteCfRecord('${key}', ${realIdx})">✕</button>
    </div>`;
  }).join('');
}

function openEditCfModal(key, idx) {
  const r = (_data.cashflow_monthly[key] || [])[idx];
  if (!r) return;
  _editCfKey = key; _editCfIdx = idx;
  document.getElementById('cf-modal-title').textContent = 'EDIT CASHFLOW RECORD';
  document.getElementById('cf-date').value   = r.date;
  const inc = r.type === '收入' || (r.type == null && r.amount >= 0);
  document.getElementById('cf-type').value   = inc ? 'income' : 'expense';
  document.getElementById('cf-cat').value    = r.category || '';
  document.getElementById('cf-amount').value = Math.abs(r.amount);
  document.getElementById('cf-note').value   = r.note || '';
  openModal('cf-modal');
  document.getElementById('cf-cat').focus();
}

document.getElementById('cf-cancel-btn').addEventListener('click', () => closeModal('cf-modal'));

document.getElementById('cf-record-save-btn').addEventListener('click', () => {
  const dt   = document.getElementById('cf-date').value;
  const type = document.getElementById('cf-type').value;
  const cat  = document.getElementById('cf-cat').value.trim();
  const amt  = parseFloat(document.getElementById('cf-amount').value) || 0;
  const note = document.getElementById('cf-note').value.trim();
  if (!dt || !cat || amt === 0) return;

  const recType = type === 'income' ? '收入' : '支出';
  const record  = { date: dt, type: recType, category: cat, amount: Math.abs(amt), note };

  if (!_data.cashflow_monthly) _data.cashflow_monthly = {};

  if (_editCfKey !== null && _editCfIdx >= 0) {
    if (_data.cashflow_monthly[_editCfKey]) {
      _data.cashflow_monthly[_editCfKey][_editCfIdx] = record;
    }
  } else {
    const key = dt.slice(0, 7);
    if (!_data.cashflow_monthly[key]) _data.cashflow_monthly[key] = [];
    _data.cashflow_monthly[key].push(record);
  }

  _editCfKey = null; _editCfIdx = -1;
  closeModal('cf-modal');
  renderCashflow();
  scheduleSave();
});

function deleteCfRecord(key, idx) {
  if (!_data.cashflow_monthly || !_data.cashflow_monthly[key]) return;
  _data.cashflow_monthly[key].splice(idx, 1);
  renderCashflow();
  scheduleSave();
}

// ── CSV Export ────────────────────────────────────────────
function csvEsc(s) {
  s = String(s || '');
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? '"' + s.replace(/"/g, '""') + '"' : s;
}

document.getElementById('export-csv-btn').addEventListener('click', () => {
  const key     = getCfKey();
  const records = (_data.cashflow_monthly || {})[key] || [];
  if (!records.length) { showToast('本月無資料可匯出'); return; }
  const sorted = [...records].sort((a, b) => a.date.localeCompare(b.date));
  const rows = ['日期,類型,分類,金額,備註'].concat(
    sorted.map(r => {
      const type = r.type || (r.amount >= 0 ? '收入' : '支出');
      return [r.date, type, csvEsc(r.category), Math.abs(r.amount), csvEsc(r.note || '')].join(',');
    })
  );
  const blob = new Blob(['﻿' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `cashflow-${key}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
});

// ══════════════════════════════════════════════════════════
//  XSS GUARD
// ══════════════════════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
